function startQuiz(sub){

subject=sub
current=0
score=0

document.querySelector(".menu").style.display="none"
document.querySelector(".quizbox").style.display="block"

showQ()

}

function showQ(){

let q=quizzes[subject][current]

document.getElementById("q").innerHTML=q.q

let html=""

q.o.forEach((opt,i)=>{
html+=`<button class='option' onclick='select(${i})'>${opt}</button>`
})

document.getElementById("options").innerHTML=html

document.getElementById("count").innerHTML="Question "+(current+1)+" / 20"

}

function select(i){

if(i==quizzes[subject][current].a) score+=2

current++

if(current<20) showQ()
else finish()

}

function finish(){

document.querySelector(".quizbox").innerHTML="<h2>Your Score : "+score+" / 40</h2>"

}
